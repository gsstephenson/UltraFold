name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  # v2.x is Python 3. Unit tests need only numpy (+ pandas/matplotlib to import the
  # main module). The end-to-end golden tests need the external folding tools
  # (contrafold / RNAstructure) + DATAPATH and skip automatically here; run them on a
  # machine that has those tools (see tests/README.md).
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install numpy pandas matplotlib
      - name: Byte-compile all Python 3 sources
        run: python -m py_compile src/ultrafold/*.py tools/*.py
      - name: Run unit tests (external-tool e2e tests skip automatically)
        run: |
          cd tests
          python -m unittest discover -p 'test_*.py' -v
